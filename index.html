<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>昆虫カードバトル Online</title>
  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg-color: #121212;
      --panel-bg: #1e1e24;
      --accent-red: #e63946;
      --accent-blue: #457b9d;
      --accent-green: #2a9d8f;
      --text-color: #f1faee;
      --card-width: 72px;
      --card-height: 108px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ロビー画面 */
    #lobby {
      background: var(--panel-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    #lobby h1 { margin-bottom: 1rem; color: #f4a261; }
    .lobby-section { margin: 1.5rem 0; }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a35;
      color: #fff;
      text-align: center;
      font-size: 1rem;
    }

    button {
      background: #f4a261;
      color: #111;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      transition: 0.2s;
    }

    button:hover { background: #e76f51; color: #fff; }
    button:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }

    /* コピー用ID表示 */
    #copy-id-container {
      margin-top: 10px;
      display: none;
    }
    .copy-btn {
      background: #2a2a35;
      border: 1px solid #4ea8de;
      color: #4ea8de;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      word-break: break-all;
    }
    .copy-btn:hover { background: #3a3a45; color: #fff; }

    /* ゲーム画面 */
    #game-board {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100vw;
      height: 100vh;
      max-width: 600px;
      background: #18181c;
      position: relative;
    }

    .area {
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .territory-zone {
      display: flex;
      gap: 3px;
    }
    .territory-card {
      width: 14px;
      height: 20px;
      background: #e76f51;
      border-radius: 2px;
      border: 1px solid #fff;
    }

    .field-zone {
      min-height: 112px;
      background: rgba(0,0,0,0.2);
      border: 2px dashed #333;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 4px;
      overflow-x: auto;
    }

    /* エサ場ゾーン */
    .food-zone-wrapper {
      background: rgba(42, 157, 143, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 2px 6px;
    }
    .food-zone-title {
      font-size: 0.65rem;
      color: #2a9d8f;
      font-weight: bold;
      margin-bottom: 2px;
    }
    .food-zone {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      min-height: 50px;
      align-items: center;
    }
    .food-zone .card {
      width: 35px;
      height: 50px;
      border-width: 1px;
      padding: 2px;
    }
    .food-zone .card .card-img { height: 20px; }
    .food-zone .card .card-name { display: none; }
    .food-zone .card .card-header { font-size: 0.55rem; }
    .food-zone .card .card-cost { width: 12px; height: 12px; font-size: 0.55rem; }
    .food-zone .card .card-stats { font-size: 0.5rem; }

    /* センタールーム */
    #center-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 10px;
      background: #2a2a35;
    }

    #log {
      font-size: 0.75rem;
      color: #aaa;
      max-width: 65%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 手札ゾーン */
    .hand-zone {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0;
      min-height: 112px;
    }

    /* カードのデザイン */
    .card {
      width: var(--card-width);
      height: var(--card-height);
      border-radius: 6px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      border: 2px solid #555;
      background: #333;
      transition: transform 0.1s, border-color 0.2s;
    }

    .card.red { background: linear-gradient(135deg, #590d22, #800f2f); border-color: var(--accent-red); }
    .card.blue { background: linear-gradient(135deg, #1d3557, #457b9d); border-color: var(--accent-blue); }
    .card.green { background: linear-gradient(135deg, #114b5f, #2a9d8f); border-color: var(--accent-green); }

    .card.selected { transform: translateY(-8px); border-color: #fff; box-shadow: 0 0 10px #fff; }
    .card.exhausted { opacity: 0.5; filter: grayscale(60%); }

    .card-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.65rem; z-index: 1; }
    .card-cost { background: rgba(0,0,0,0.7); border-radius: 50%; width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; }
    .card-element { font-size: 0.65rem; }
    
    .card-img {
      width: 100%;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      margin: 1px 0;
      background: rgba(0,0,0,0.3);
    }

    .card-name { font-size: 0.6rem; text-align: center; font-weight: bold; word-break: break-all; line-height: 1.1; }
    
    .card-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      font-weight: bold;
      background: rgba(0,0,0,0.4);
      padding: 1px 3px;
      border-radius: 3px;
    }
    .card-atk { color: #ffe66d; }
    .card-hp { color: #2a9d8f; }

    /* 操作アクションパネル */
    #action-modal {
      position: absolute;
      bottom: 125px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      padding: 8px;
      border-radius: 8px;
      display: flex;
      gap: 8px;
      z-index: 100;
      border: 1px solid #555;
    }
    #action-modal.hidden { display: none; }
    #action-modal button { width: auto; font-size: 0.75rem; padding: 6px 10px; }

    .hidden { display: none !important; }
    
    .targetable-hero {
      animation: pulse 1s infinite alternate;
      cursor: pointer;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 4px var(--accent-red); }
      to { box-shadow: 0 0 12px var(--accent-red); }
    }
  </style>
</head>
<body>

  <!-- ロビー画面 -->
  <div id="lobby">
    <h1>蟲カードバトル</h1>
    <div class="lobby-section">
      <button id="btn-create">部屋を作成（ホスト）</button>
      <div id="copy-id-container">
        <div style="font-size: 0.8rem; margin-bottom:4px; color:#aaa;">下のIDをタップしてコピー:</div>
        <div id="host-id-btn" class="copy-btn">ID生成中...</div>
      </div>
    </div>
    <hr style="border-color:#444;">
    <div class="lobby-section">
      <input type="text" id="join-id" placeholder="相手のIDを入力">
      <button id="btn-join">部屋に入る（ゲスト）</button>
    </div>
    <div id="status-msg" style="margin-top:15px; font-size:0.85rem; color:#aaa;"></div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-board" class="hidden">
    <!-- 相手エリア -->
    <div class="area" id="opponent-area">
      <div class="player-info" id="opponent-info-box">
        <div>
          相手 [デッキ:<span id="opp-deck">0</span> 手札:<span id="opp-hand-count">0</span>]
        </div>
        <div class="territory-zone" id="opp-territory"></div>
      </div>
      <!-- 相手エサ場 -->
      <div class="food-zone-wrapper">
        <div class="food-zone-title">相手のエサ場 (<span id="opp-food-count">0</span>)</div>
        <div class="food-zone" id="opp-food"></div>
      </div>
      <!-- 相手フィールド -->
      <div class="field-zone" id="opp-field"></div>
    </div>

    <!-- 中央操作バー -->
    <div id="center-bar">
      <div id="log">対戦開始！</div>
      <button id="btn-end-turn" style="width: auto; padding: 4px 12px; font-size:0.85rem;">ターン終了</button>
    </div>

    <!-- 自分エリア -->
    <div class="area" id="my-area">
      <!-- 自分フィールド -->
      <div class="field-zone" id="my-field"></div>
      <!-- 自分エサ場 -->
      <div class="food-zone-wrapper">
        <div class="food-zone-title">自分のエサ場 (コスト:<span id="my-mana">0</span>/<span id="my-food-count">0</span>)</div>
        <div class="food-zone" id="my-food"></div>
      </div>
      <div class="player-info">
        <div>
          自分 [デッキ:<span id="my-deck">0</span>]
        </div>
        <div class="territory-zone" id="my-territory"></div>
      </div>
      <!-- 自分手札 -->
      <div class="hand-zone" id="my-hand"></div>
    </div>

    <!-- アクション選択ポップアップ -->
    <div id="action-modal" class="hidden">
      <button id="btn-act-food">エサ場に置く</button>
      <button id="btn-act-play">場に出す</button>
      <button id="btn-act-cancel">キャンセル</button>
    </div>
  </div>

  <script>
    // --- Web Audio API 効果音 ---
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSE(type) {
      if (!audioCtx) return;
      try {
        if (type === 'attack') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.12);
        } else if (type === 'destroy') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(150, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.25);
          gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.25);
        }
      } catch(e) {
        console.log("SE Error:", e);
      }
    }

    function triggerSE(type) {
      playSE(type);
      if (conn && conn.open) {
        conn.send({ type: 'SE', se: type });
      }
    }

    // --- カード定義データ ---
    const CARD_DATA = [
      { name: "アリ", cost: 1, atk: 700, hp: 500, element: "red", image: "images/ant.jpg" },
      { name: "クワガタ", cost: 2, atk: 1300, hp: 800, element: "red", image: "images/kuwagata.jpg" },
      { name: "カブトムシ", cost: 3, atk: 1800, hp: 1300, element: "red", image: "images/kabuto.jpg" },
      { name: "スズメバチ", cost: 4, atk: 2500, hp: 1800, element: "red", image: "images/suzu.jpg" },
      { name: "アメンボ", cost: 1, atk: 400, hp: 800, element: "blue", image: "images/amen.jpg" },
      { name: "ゲンゴロウ", cost: 2, atk: 800, hp: 1300, element: "blue", image: "images/gengo.jpg" },
      { name: "タガメ", cost: 3, atk: 1200, hp: 2000, element: "blue", image: "images/tagame.png" },
      { name: "ミズカマキリ", cost: 4, atk: 1700, hp: 2700, element: "blue", image: "images/mizu.png" },
      { name: "バッタ", cost: 1, atk: 600, hp: 600, element: "green", image: "images/bat.png" },
      { name: "キリギリス", cost: 2, atk: 1000, hp: 1000, element: "green", image: "images/ki.png" },
      { name: "カマキリ", cost: 3, atk: 1500, hp: 1500, element: "green", image: "images/kama.png" },
      { name: "オニヤンマ", cost: 4, atk: 2100, hp: 2200, element: "green", image: "images/oni.png" },
    ];

    // --- ゲーム状態変数 ---
    let peer = null, conn = null;
    let isHost = false;
    let myRole = '';
    let selectedHandIndex = null;
    let selectedAttackerCardId = null;

    let G = {
      turn: 'host',
      foodSetThisTurn: false,
      players: {
        host: { deck: [], hand: [], field: [], food: [], mana: 0, territory: [] },
        guest: { deck: [], hand: [], field: [], food: [], mana: 0, territory: [] }
      }
    };

    // --- PeerJS 接続処理 ---
    const btnCreate = document.getElementById('btn-create');
    const btnJoin = document.getElementById('btn-join');
    const statusMsg = document.getElementById('status-msg');
    const copyIdBtn = document.getElementById('host-id-btn');
    const copyIdContainer = document.getElementById('copy-id-container');

    function createPeer() {
      if (typeof Peer === 'undefined') {
        alert("PeerJSの読み込みに失敗しています。ネット接続を確認して再読み込みしてください。");
        return null;
      }
      const p = new Peer();
      p.on('error', err => {
        console.error("PeerJS Error:", err);
        statusMsg.innerText = "通信エラーが発生しました: " + err.type;
        statusMsg.style.color = "#e63946";
        btnCreate.disabled = false;
        btnJoin.disabled = false;
      });
      return p;
    }

    btnCreate.addEventListener('click', () => {
      initAudio();
      isHost = true;
      myRole = 'host';
      btnCreate.disabled = true;
      statusMsg.style.color = "#aaa";
      statusMsg.innerText = "ID発行中...";
      
      peer = createPeer();
      if (!peer) return;

      peer.on('open', id => {
        copyIdBtn.innerText = `📋 ${id}`;
        copyIdContainer.style.display = 'block';
        statusMsg.innerText = "IDをタップしてコピーし、相手に共有してください。";
        
        copyIdBtn.onclick = () => {
          navigator.clipboard.writeText(id).then(() => {
            alert("部屋IDをクリップボードにコピーしました！");
          }).catch(() => {
            alert("コピー用ID: " + id);
          });
        };
      });

      peer.on('connection', c => {
        conn = c;
        setupConnection();
      });
    });

    btnJoin.addEventListener('click', () => {
      const hostId = document.getElementById('join-id').value.trim();
      if (!hostId) return alert("相手のIDを入力してください");

      initAudio();
      isHost = false;
      myRole = 'guest';
      btnJoin.disabled = true;
      statusMsg.style.color = "#aaa";
      statusMsg.innerText = "接続中...";
      
      peer = createPeer();
      if (!peer) return;

      peer.on('open', () => {
        conn = peer.connect(hostId);
        setupConnection();
      });
    });

    function setupConnection() {
      if (!conn) return;

      conn.on('open', () => {
        statusMsg.innerText = "接続成功！ゲームを開始します...";
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game-board').classList.remove('hidden');
        if (isHost) {
          initGame();
        }
      });

      conn.on('data', data => {
        handleNetworkData(data);
      });

      conn.on('close', () => {
        alert("相手との接続が切断されました。");
        location.reload();
      });
    }

    function sendState() {
      if (isHost) {
        conn.send({ type: 'SYNC', state: G });
        render();
      }
    }

    function sendAction(action, payload) {
      if (isHost) {
        processAction(myRole, action, payload);
      } else {
        conn.send({ type: 'ACTION', role: myRole, action, payload });
      }
    }

    function handleNetworkData(data) {
      if (data.type === 'SYNC') {
        G = data.state;
        render();
      } else if (data.type === 'ACTION' && isHost) {
        processAction(data.role, data.action, data.payload);
      } else if (data.type === 'SE') {
        playSE(data.se);
      }
    }

    // --- ゲームロジック ---
    function createDeck() {
      let deck = [];
      let idCounter = 1;
      for (let i = 0; i < 20; i++) {
        let base = CARD_DATA[i % CARD_DATA.length];
        deck.push({ 
          ...base, 
          maxHp: base.hp, 
          id: myRole + '_' + (idCounter++) + '_' + Math.random().toString(36).substr(2, 4), 
          exhausted: false 
        });
      }
      return deck.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      let hostDeck = createDeck();
      let guestDeck = createDeck();

      G.players.host.territory = hostDeck.splice(0, 6);
      G.players.host.hand = hostDeck.splice(0, 4);
      G.players.host.deck = hostDeck;
      G.players.host.food = [];

      G.players.guest.territory = guestDeck.splice(0, 6);
      G.players.guest.hand = guestDeck.splice(0, 4);
      G.players.guest.deck = guestDeck;
      G.players.guest.food = [];

      G.turn = 'host';
      startTurn('host');
    }

    function startTurn(role) {
      G.turn = role;
      G.foodSetThisTurn = false;
      let p = G.players[role];
      
      if (p.deck.length > 0) {
        p.hand.push(p.deck.pop());
      }

      p.mana = p.food.length;
      // ターン開始時：自分の場の虫を起こし＆HP全回復
      p.field.forEach(c => {
        c.exhausted = false;
        c.hp = c.maxHp; 
      });

      log(`${role === myRole ? 'あなた' : '相手'}のターン開始`);
      sendState();
    }

    function processAction(role, action, payload) {
      if (G.turn !== role) return;

      let p = G.players[role];
      let oppRole = role === 'host' ? 'guest' : 'host';
      let opp = G.players[oppRole];

      if (action === 'SET_FOOD') {
        if (G.foodSetThisTurn) return;
        let card = p.hand.splice(payload.handIndex, 1)[0];
        p.food.push(card);
        p.mana++;
        G.foodSetThisTurn = true;
        log(`${role === myRole ? 'あなた' : '相手'}は[${card.name}]をエサ場に置いた`);
      } 
      else if (action === 'PLAY_CARD') {
        let card = p.hand[payload.handIndex];
        if (p.mana >= card.cost) {
          p.mana -= card.cost;
          p.hand.splice(payload.handIndex, 1);
          card.exhausted = false;
          p.field.push(card);
          log(`${role === myRole ? 'あなた' : '相手'}は[${card.name}]を召喚！`);
        }
      }
      else if (action === 'ATTACK_BUG') {
        let attacker = p.field.find(c => c.id === payload.attackerId);
        let defender = opp.field.find(c => c.id === payload.defenderId);

        if (attacker && defender && !attacker.exhausted) {
          attacker.exhausted = true;
          
          let attAtk = calcAtk(attacker, defender);

          triggerSE('attack');

          // 攻撃を受けた防衛側の虫のみHPが減少（攻撃側のHPは減らない）
          defender.hp -= attAtk;

          log(`[${attacker.name}]の攻撃！ ${defender.name}に${attAtk}ダメージ！`);

          let hasDestroyed = false;
          if (defender.hp <= 0) {
            opp.field = opp.field.filter(c => c.id !== defender.id);
            log(`相手の[${defender.name}]を撃破！`);
            hasDestroyed = true;
          }

          if (hasDestroyed) {
            setTimeout(() => triggerSE('destroy'), 150);
          }
        }
      }
      else if (action === 'ATTACK_HERO') {
        let attacker = p.field.find(c => c.id === payload.attackerId);
        if (attacker && !attacker.exhausted) {
          attacker.exhausted = true;
          triggerSE('attack');

          if (opp.territory.length > 0) {
            let taken = opp.territory.pop();
            opp.hand.push(taken);
            log(`本体攻撃成功！[${attacker.name}]が縄張りを1枚削った！`);
          } else {
            triggerSE('destroy');
            log(`決着！ ${role === myRole ? 'あなた' : '相手'}の勝利！`);
            alert(`${role === myRole ? '勝利！' : '敗北...'}`);
          }
        }
      }
      else if (action === 'END_TURN') {
        startTurn(oppRole);
        return;
      }

      sendState();
    }

    function calcAtk(att, def) {
      let mul = 1;
      if (
        (att.element === 'red' && def.element === 'green') ||
        (att.element === 'green' && def.element === 'blue') ||
        (att.element === 'blue' && def.element === 'red')
      ) {
        mul = 2;
      }
      return att.atk * mul;
    }

    function log(msg) {
      document.getElementById('log').innerText = msg;
    }

    // --- レンダリング (UI描画) ---
    function render() {
      let isMyTurn = G.turn === myRole;
      let me = G.players[myRole];
      let oppRole = myRole === 'host' ? 'guest' : 'host';
      let opp = G.players[oppRole];

      document.getElementById('my-mana').innerText = me.mana;
      document.getElementById('my-food-count').innerText = me.food.length;
      document.getElementById('my-deck').innerText = me.deck.length;

      document.getElementById('opp-food-count').innerText = opp.food.length;
      document.getElementById('opp-deck').innerText = opp.deck.length;
      document.getElementById('opp-hand-count').innerText = opp.hand.length;

      const btnEnd = document.getElementById('btn-end-turn');
      btnEnd.disabled = !isMyTurn;
      btnEnd.style.background = isMyTurn ? '#e76f51' : '#555';

      renderTerritory('my-territory', me.territory.length);
      renderTerritory('opp-territory', opp.territory.length);

      renderCardZone('my-food', me.food);
      renderCardZone('opp-food', opp.food);

      const handEl = document.getElementById('my-hand');
      handEl.innerHTML = '';
      me.hand.forEach((card, idx) => {
        let cardEl = createCardEl(card);
        if (selectedHandIndex === idx) cardEl.classList.add('selected');
        cardEl.onclick = () => {
          if (!isMyTurn) return;
          selectedHandIndex = (selectedHandIndex === idx) ? null : idx;
          selectedAttackerCardId = null;
          render();
          toggleActionModal();
        };
        handEl.appendChild(cardEl);
      });

      const myFieldEl = document.getElementById('my-field');
      myFieldEl.innerHTML = '';
      me.field.forEach(card => {
        let cardEl = createCardEl(card);
        if (card.id === selectedAttackerCardId) cardEl.classList.add('selected');
        cardEl.onclick = () => {
          if (!isMyTurn || card.exhausted) return;
          selectedAttackerCardId = (selectedAttackerCardId === card.id) ? null : card.id;
          selectedHandIndex = null;
          toggleActionModal();
          render();
        };
        myFieldEl.appendChild(cardEl);
      });

      const oppFieldEl = document.getElementById('opp-field');
      oppFieldEl.innerHTML = '';
      opp.field.forEach(card => {
        let cardEl = createCardEl(card);
        if (selectedAttackerCardId) {
          cardEl.classList.add('targetable-hero');
          cardEl.onclick = () => {
            sendAction('ATTACK_BUG', { attackerId: selectedAttackerCardId, defenderId: card.id });
            selectedAttackerCardId = null;
            render();
          };
        }
        oppFieldEl.appendChild(cardEl);
      });

      const oppInfoBox = document.getElementById('opponent-info-box');
      if (selectedAttackerCardId) {
        oppInfoBox.classList.add('targetable-hero');
        oppInfoBox.onclick = () => {
          sendAction('ATTACK_HERO', { attackerId: selectedAttackerCardId });
          selectedAttackerCardId = null;
          render();
        };
      } else {
        oppInfoBox.classList.remove('targetable-hero');
        oppInfoBox.onclick = null;
      }
    }

    function renderTerritory(elementId, count) {
      const el = document.getElementById(elementId);
      el.innerHTML = '';
      for (let i = 0; i < count; i++) {
        let t = document.createElement('div');
        t.className = 'territory-card';
        el.appendChild(t);
      }
    }

    function renderCardZone(elementId, cardArray) {
      const el = document.getElementById(elementId);
      el.innerHTML = '';
      cardArray.forEach(card => {
        el.appendChild(createCardEl(card));
      });
    }

    function createCardEl(card) {
      const el = document.createElement('div');
      el.className = `card ${card.element} ${card.exhausted ? 'exhausted' : ''}`;
      
      const elemText = { red: '赤', blue: '青', green: '緑' }[card.element];
      const hpColor = (card.hp < card.maxHp) ? '#e63946' : '#2a9d8f';

      el.innerHTML = `
        <div class="card-header">
          <div class="card-cost">${card.cost}</div>
          <div class="card-element">${elemText}</div>
        </div>
        <img class="card-img" src="${card.image}" alt="${card.name}">
        <div class="card-name">${card.name}</div>
        <div class="card-stats">
          <span class="card-atk">P:${card.atk}</span>
          <span class="card-hp" style="color:${hpColor}">H:${card.hp}</span>
        </div>
      `;
      return el;
    }

    function toggleActionModal() {
      const modal = document.getElementById('action-modal');
      if (selectedHandIndex !== null) {
        modal.classList.remove('hidden');
        document.getElementById('btn-act-food').disabled = G.foodSetThisTurn;
        let card = G.players[myRole].hand[selectedHandIndex];
        document.getElementById('btn-act-play').disabled = G.players[myRole].mana < card.cost;
      } else {
        modal.classList.add('hidden');
      }
    }

    // --- UIイベント ---
    document.getElementById('btn-act-food').onclick = () => {
      if (selectedHandIndex !== null) {
        sendAction('SET_FOOD', { handIndex: selectedHandIndex });
        selectedHandIndex = null;
        toggleActionModal();
      }
    };

    document.getElementById('btn-act-play').onclick = () => {
      if (selectedHandIndex !== null) {
        sendAction('PLAY_CARD', { handIndex: selectedHandIndex });
        selectedHandIndex = null;
        toggleActionModal();
      }
    };

    document.getElementById('btn-act-cancel').onclick = () => {
      selectedHandIndex = null;
      toggleActionModal();
      render();
    };

    document.getElementById('btn-end-turn').onclick = () => {
      selectedHandIndex = null;
      selectedAttackerCardId = null;
      toggleActionModal();
      sendAction('END_TURN');
    };
  </script>
</body>
</html>
