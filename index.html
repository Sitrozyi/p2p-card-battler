<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>昆虫カードバトル Online</title>

  <!-- LINEなどのアプリ内ブラウザ対策 -->
  <script>
    (function() {
      var ua = navigator.userAgent || '';
      if (ua.indexOf('LINE') !== -1) {
        if (location.href.indexOf('openExternalBrowser=1') === -1) {
          var sep = location.href.indexOf('?') !== -1 ? '&' : '?';
          location.href = location.href + sep + 'openExternalBrowser=1';
        }
      }
    })();
  </script>

  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 🎵 BGM ON/OFF ボタン -->
  <button id="btn-bgm-toggle" class="bgm-toggle-btn" onclick="toggleBGM()">🎵 BGM: ON</button>

  <!-- ロビー画面 -->
  <div id="lobby">
    <h1>蟲カードバトル</h1>

    <div class="lobby-section">
      <div class="avatar-select-title">アイコンを選択</div>
      <div id="avatar-list" class="avatar-list"></div>
    </div>

    <!-- 盤面（バイオーム）テーマ選択 -->
    <div class="lobby-section">
      <div class="avatar-select-title">自分の盤面テーマを選択</div>
      <select id="biome-select" class="biome-select" onchange="changeBiome(this.value)">
        <option value="forest">🌳 深夜の森林 (蛍・風で揺れる草木)</option>
        <option value="ocean">🌊 深海の池 (水泡・横切る魚群)</option>
        <option value="lava">🌋 灼熱の溶岩 (火の粉・流れるマグマ)</option>
      </select>
    </div>

    <!-- デッキ編集ボタン -->
    <div class="lobby-section">
      <button class="btn-deck-edit" onclick="openDeckBuilder()">🛠️ デッキ編集 (<span id="lobby-deck-count">20</span>/20枚)</button>
    </div>

    <div class="lobby-section">
      <button id="btn-create" onclick="createRoom()">部屋を作成（ホスト）</button>
      <div id="copy-id-container">
        <div style="font-size: 0.8rem; margin-bottom:4px; color:#aaa;">下のIDをタップしてコピー:</div>
        <div id="host-id-btn" class="copy-btn">ID生成中...</div>
      </div>
    </div>
    <hr style="border-color: rgba(212, 175, 55, 0.2);">
    <div class="lobby-section">
      <input type="text" id="join-id" placeholder="相手のIDを入力">
      <button id="btn-join" onclick="joinRoom()">部屋に入る（ゲスト）</button>
    </div>
    <div id="status-msg" style="margin-top:15px; font-size:0.85rem; color:#aaa;"></div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-board" class="hidden">
    <!-- 🍃 蛍・魚群・流体マグマ等の演出描画キャンバス -->
    <canvas id="firefly-canvas"></canvas>

    <!-- 🎯 スタイリッシュターゲットアロー SVG描画レイヤー -->
    <svg id="target-arrow-svg" class="target-arrow-svg">
      <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff3344" />
        </marker>
      </defs>
      <path id="arrow-path" class="arrow-path hidden" d="" marker-end="url(#arrowhead)" />
    </svg>

    <!-- 🚩 ターン開始演出バナー -->
    <div id="turn-banner" class="turn-banner hidden">
      <div id="turn-banner-text" class="turn-banner-text">次はあなたの番です</div>
    </div>

    <!-- 相手エリア (画面上半分) -->
    <div class="area" id="opponent-area">
      <div class="player-info" id="opponent-info-box">
        <div class="player-profile">
          <div class="avatar-wrapper">
            <img id="opp-avatar-img" class="player-avatar" src="" alt="相手アイコン">
            <div id="opp-emote-bubble" class="emote-bubble hidden"></div>
          </div>
          <div>
            相手 [デッキ:<span id="opp-deck">0</span> 手札:<span id="opp-hand-count">0</span>]
          </div>
        </div>
        <div class="territory-zone" id="opp-territory"></div>
      </div>
      <!-- 相手エサ場 -->
      <div class="food-zone-wrapper">
        <div class="food-zone-title">相手のエサ場 (<span id="opp-food-count">0</span>)</div>
        <div class="food-zone" id="opp-food"></div>
      </div>
      <!-- 相手フィールド -->
      <div class="field-zone" id="opp-field"></div>
    </div>

    <!-- 中央操作バー (境界仕切り) -->
    <div id="center-bar">
      <button id="btn-surrender" class="btn-surrender">サレンダー</button>
      <div id="log">対戦開始！</div>
      <button id="btn-end-turn">ターン終了</button>
    </div>

    <!-- 自分エリア (画面下半分) -->
    <div class="area" id="my-area">
      <!-- 自分フィールド -->
      <div class="field-zone" id="my-field"></div>
      <!-- 自分エサ場 -->
      <div class="food-zone-wrapper">
        <div class="food-zone-title">自分のエサ場 (コスト:<span id="my-mana">0</span>/<span id="my-food-count">0</span>)</div>
        <div class="food-zone" id="my-food"></div>
      </div>
      <div class="player-info">
        <div class="player-profile">
          <div class="avatar-wrapper">
            <img id="my-avatar-img" class="player-avatar" src="" alt="自分アイコン">
            <button class="emote-trigger-btn" onclick="toggleEmotePicker(event)">💬</button>
            <div id="my-emote-bubble" class="emote-bubble hidden"></div>

            <!-- エモート選択ポップアップ -->
            <div id="emote-picker" class="emote-picker hidden" onclick="event.stopPropagation()">
              <button onclick="sendEmote('よろしく！')">👋 よろしく！</button>
              <button onclick="sendEmote('すごい！')">👏 すごい！</button>
              <button onclick="sendEmote('ぐぬぬ…')">😣 ぐぬぬ…</button>
              <button onclick="sendEmote('参りました！')">🙇 参りました！</button>
            </div>
          </div>
          <div>
            自分 [デッキ:<span id="my-deck">0</span>]
          </div>
        </div>
        <div class="territory-zone" id="my-territory"></div>
      </div>
      <!-- 自分手札 -->
      <div class="hand-zone" id="my-hand"></div>
    </div>

    <!-- アクション選択ポップアップ -->
    <div id="action-modal" class="hidden">
      <div class="action-modal-content">
        <div class="action-modal-title" id="action-modal-card-name">カード選択</div>
        <div class="action-modal-buttons">
          <button id="btn-act-food">エサ場に置く</button>
          <button id="btn-act-play">場に出す</button>
          <button id="btn-act-cancel" class="btn-secondary">キャンセル</button>
        </div>
      </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-modal" class="hidden">
      <div class="result-content">
        <h2 id="result-title">VICTORY</h2>
        <p id="result-msg">あなたの勝利です！</p>
        <div class="result-buttons">
          <button id="btn-rematch">再戦する</button>
          <button id="btn-home" class="btn-secondary">ホームに戻る</button>
        </div>
        <div id="rematch-status"></div>
      </div>
    </div>

    <!-- 🔍 カード拡大プレビューモーダル -->
    <div id="card-preview-modal" class="preview-modal hidden" onclick="closeCardPreview()">
      <div class="preview-modal-content" onclick="event.stopPropagation()">
        <div id="preview-card-container"></div>
        <div id="preview-card-desc" class="preview-card-desc"></div>
        <button class="btn-secondary" style="margin-top:10px; width:100%;" onclick="closeCardPreview()">閉じる</button>
      </div>
    </div>

  </div>

  <!-- 🪙 コインフリップモーダル -->
  <div id="coin-modal" class="coin-modal hidden">
    <div class="coin-box">
      <div class="coin-inner">蟲</div>
    </div>
    <div id="coin-result-text" class="coin-result-text">先攻後攻を決めています...</div>
  </div>

  <!-- 🏆 フィニッシュカットイン演出オーバーレイ -->
  <div id="finish-cutin" class="finish-cutin-overlay hidden">
    <img id="finish-avatar-img" class="finish-avatar" src="" alt="勝者">
    <div id="finish-text-title" class="finish-text-title">VICTORY</div>
  </div>

  <!-- デッキ構築モーダル -->
  <div id="deck-builder-modal" class="deck-modal hidden">
    <div class="deck-modal-content">
      <div class="deck-header">
        <h2>🛠️ デッキ編成</h2>
        <div class="deck-counter">枚数: <span id="deck-count-num">0</span> / 20枚</div>
      </div>

      <div class="deck-section-title">▼ 構成中のデッキ (タップで外す)</div>
      <div id="current-deck-grid" class="deck-grid"></div>

      <div class="deck-section-title">▼ カードプール (タップで追加 / 同種3枚まで)</div>
      <div id="card-pool-grid" class="deck-grid pool-grid"></div>

      <div class="deck-footer-buttons">
        <button class="btn-secondary" onclick="resetDeckToDefault()">標準初期化</button>
        <button onclick="saveAndCloseDeckBuilder()">保存して完了</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
